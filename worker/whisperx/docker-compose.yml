services:
  whisperx-worker:
    build: .
    image: castrecall-whisperx-worker:local
    restart: unless-stopped
    environment:
      WORKER_TOKEN: ${WORKER_TOKEN:?set WORKER_TOKEN to a private bearer token before starting the worker}
      WORKER_BIND_HOST: 0.0.0.0
      WORKER_PORT: 8000
      WHISPERX_MODEL: ${WHISPERX_MODEL:-large-v3}
      WHISPERX_LANGUAGE: ${WHISPERX_LANGUAGE:-}
      WHISPERX_BATCH_SIZE: ${WHISPERX_BATCH_SIZE:-16}
      WHISPERX_COMPUTE_TYPE: ${WHISPERX_COMPUTE_TYPE:-float16}
      WHISPERX_DIARIZE: ${WHISPERX_DIARIZE:-false}
      HF_TOKEN: ${HF_TOKEN:-}
      DELETE_AUDIO: ${DELETE_AUDIO:-true}
      MAX_ACTIVE_JOBS: ${MAX_ACTIVE_JOBS:-1}
      MAX_QUEUED_JOBS: ${MAX_QUEUED_JOBS:-16}
    ports:
      # Bound to the host's loopback only — reach it over Tailscale/a private
      # network via an SSH tunnel or a Tailscale-aware reverse proxy, never
      # by publishing this on a public interface. See README "Network exposure".
      - "127.0.0.1:${WORKER_PORT:-8000}:8000"
    volumes:
      # Persist downloaded WhisperX/align/diarization models across restarts
      # so every container start doesn't re-download multi-GB weights.
      - whisperx-model-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  whisperx-model-cache:
